name: bratnava_fc_app
description: BratnavaFC - Gerenciador de futebol para grupos e partidas.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP / API
  dio: ^5.4.3

  # Models / Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0

  # Image handling (polls feature)
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Firebase / Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Ícone do app e splash screen
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  # Linting
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts: []

# ── Ícone do app ──────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_icon.png"
  # Adaptive icon Android (API 26+): logo com padding para respeitar o safe zone
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_hires.png"
  min_sdk_android: 21
  web:
    generate: false

# ── Splash screen ─────────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo_splash.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/logo_splash.png
